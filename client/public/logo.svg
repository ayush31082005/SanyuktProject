<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Golden Gradient for the entire logo -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8A96A;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#F5E6C8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#F5E6C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8A96A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Stylized Bodhi Tree -->
  <g filter="url(#shadow)" transform="translate(320, 20)">
    <path fill="url(#goldGradient)" d="M80,180 C80,180 75,150 80,140 C85,130 90,135 95,120 C100,105 90,100 110,80 C130,60 150,70 160,50 C170,30 150,10 80,0 C10,-10 -10,30 0,50 C10,70 30,60 50,80 C70,100 60,105 65,120 C70,135 75,130 80,140 C85,150 80,180 80,180 Z" transform="translate(0, 20) scale(1.0)" />
    <!-- Leaves (Stylized) -->
    <circle fill="url(#goldGradient)" cx="80" cy="50" r="45" opacity="0.8" />
    <circle fill="url(#goldGradient)" cx="50" cy="70" r="35" opacity="0.8" />
    <circle fill="url(#goldGradient)" cx="110" cy="70" r="35" opacity="0.8" />
    <circle fill="url(#goldGradient)" cx="30" cy="100" r="25" opacity="0.8" />
    <circle fill="url(#goldGradient)" cx="130" cy="100" r="25" opacity="0.8" />
  </g>

  <!-- Sanyukt Parivar (Script Style) -->
  <text x="400" y="280" text-anchor="middle" font-family="'Brush Script MT', 'Dancing Script', cursive" font-size="100" font-weight="bold" fill="url(#goldGradient)" filter="url(#shadow)">
    Sanyukt Parivar
  </text>

  <!-- & Symbol -->
  <text x="400" y="380" text-anchor="middle" font-family="'Times New Roman', serif" font-size="80" font-weight="bold" fill="url(#goldGradient)" filter="url(#shadow)">
    &
  </text>

  <!-- RICH LIFE PVT LTD (Serif Style) -->
  <text x="400" y="460" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', serif" font-size="50" font-weight="bold" letter-spacing="10" fill="url(#goldGradient)" filter="url(#shadow)">
    RICH LIFE PVT LTD
  </text>

  <!-- Decorative Horizontal Lines -->
  <line x1="100" y1="365" x2="350" y2="365" stroke="url(#goldGradient)" stroke-width="2" />
  <line x1="450" y1="365" x2="700" y2="365" stroke="url(#goldGradient)" stroke-width="2" />
  
  <line x1="50" y1="480" x2="750" y2="480" stroke="url(#goldGradient)" stroke-width="4" />
</svg>
